name: CI - AT32F403A Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build-firmware:
    name: "Cross Compile (arm-none-eabi-gcc)"
    runs-on: ubuntu-latest

    container:
      image: debian:bookworm-slim

    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libnewlib-dev \
            cmake \
            make \
            ca-certificates \
            git
          update-ca-certificates
          git config --global http.sslCAInfo /etc/ssl/certs/ca-certificates.crt
          arm-none-eabi-gcc --version

      - name: Checkout
        uses: actions/checkout@v4

      - name: CMake configure
        run: |
          cmake -B build_ci \
            -G "Unix Makefiles" \
            -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DTOOLCHAIN_DIR=""

      - name: Build
        run: cmake --build build_ci -j4

      - name: Print firmware size
        run: arm-none-eabi-size build_ci/at32f403a_template.elf

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            build_ci/at32f403a_template.elf
            build_ci/at32f403a_template.hex
            build_ci/at32f403a_template.bin
          if-no-files-found: error
          retention-days: 30