name: Build Firmware

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: arm-none-eabi Build
    runs-on: ubuntu-latest

    steps:
      - name: Install CA certificates
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends ca-certificates
          sudo update-ca-certificates

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install arm-none-eabi toolchain & CMake
        run: |
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libnewlib-dev \
            cmake \
            make

      - name: Verify toolchain
        run: arm-none-eabi-gcc --version

      - name: Configure (CMake)
        run: |
          cmake -B build_ci \
            -G "Unix Makefiles" \
            -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DTOOLCHAIN_DIR=""

      - name: Build
        run: cmake --build build_ci -j4

      - name: Print firmware size
        run: arm-none-eabi-size build_ci/at32f403a_template.elf

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            build_ci/at32f403a_template.elf
            build_ci/at32f403a_template.hex
            build_ci/at32f403a_template.bin
          retention-days: 30
