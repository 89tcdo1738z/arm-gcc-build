name: Build Firmware

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: arm-none-eabi Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install arm-none-eabi toolchain & CMake
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            cmake \
            make

      - name: Verify toolchain
        run: arm-none-eabi-gcc --version

      - name: Configure (CMake)
        run: cmake --preset ci

      - name: Build
        run: cmake --build --preset ci

      - name: Print firmware size
        run: arm-none-eabi-size build_ci/at32f403a_template.elf

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            build_ci/at32f403a_template.elf
            build_ci/at32f403a_template.hex
            build_ci/at32f403a_template.bin
          retention-days: 30
